<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}} - BirdNet-Behavior</title>
    <script src="/static/htmx.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-dim: #0ea5e9;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #334155;
            --radius: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Navigation */
        nav {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 2rem;
        }
        nav .brand {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        nav .links {
            display: flex;
            gap: 1rem;
        }
        nav .links a {
            color: var(--text-muted);
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius);
            transition: background 0.2s, color 0.2s;
        }
        nav .links a:hover,
        nav .links a.active {
            background: var(--bg-hover);
            color: var(--text);
            text-decoration: none;
        }
        nav .status {
            margin-left: auto;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        nav .status .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 4px;
        }
        nav .status .dot.ok { background: var(--success); }
        nav .status .dot.err { background: var(--danger); }

        /* Layout */
        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
        .card h2 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            text-align: center;
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }
        .stat-card .label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        /* Two-column layout */
        .grid-2 {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1rem;
        }
        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 0.5rem 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        tr:hover { background: var(--bg-hover); }
        td { font-size: 0.9rem; }

        /* Confidence badge */
        .conf {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .conf.high { background: rgba(34,197,94,0.15); color: var(--success); }
        .conf.mid { background: rgba(245,158,11,0.15); color: var(--warning); }
        .conf.low { background: rgba(239,68,68,0.15); color: var(--danger); }

        /* Live indicator */
        .live-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
            margin-right: 4px;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Species list */
        .species-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
        }
        .species-item:last-child { border-bottom: none; }
        .species-name { font-weight: 500; }
        .species-count {
            background: var(--bg-hover);
            padding: 0.15rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Loading indicator */
        .htmx-indicator {
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .htmx-request .htmx-indicator,
        .htmx-request.htmx-indicator {
            display: inline-block;
            opacity: 1;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <nav>
        <div class="brand">BirdNet-Behavior</div>
        <div class="links">
            <a href="/" class="{{nav_dashboard}}">Dashboard</a>
            <a href="/species" class="{{nav_species}}">Species</a>
            <a href="/api/v2/analytics/status" class="{{nav_analytics}}">Analytics</a>
        </div>
        <div class="status" hx-get="/pages/health-badge" hx-trigger="load, every 30s" hx-swap="innerHTML">
            <span class="dot"></span> Loading...
        </div>
    </nav>
    <main>
        {{content}}
    </main>
    <footer>
        BirdNet-Behavior v{{version}} &middot; Acoustic bird classification with behavioral analytics
    </footer>
</body>
</html>
